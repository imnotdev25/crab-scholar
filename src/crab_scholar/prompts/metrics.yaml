name: metrics
display_name: "Evaluation Metrics"
description: "Specific metrics used for evaluation — what is measured and how"
system_message: |
  You are a metrics and measurement specialist for LLM evaluation research.
  Extract detailed information about all metrics used in the paper.
  Always output valid JSON.
extraction_prompt: |
  Analyze the following research paper and extract information about evaluation metrics.

  Paper: {title}
  Authors: {authors}

  TEXT:
  {paper_text}

  Extract the following and return as JSON:
  {{
    "primary_metrics": [
      {{
        "name": "metric name (e.g., BLEU, ROUGE-L, accuracy, F1)",
        "description": "what it measures",
        "type": "automatic|human|hybrid",
        "range": "value range if mentioned (e.g., 0-100, 0-1)"
      }}
    ],
    "secondary_metrics": [
      {{
        "name": "metric name",
        "description": "what it measures"
      }}
    ],
    "metric_results": [
      {{
        "metric": "metric name",
        "model": "model/method name",
        "value": "reported value",
        "dataset": "dataset it was measured on"
      }}
    ],
    "custom_metrics": [
      {{
        "name": "custom metric name",
        "definition": "how it is defined/calculated",
        "motivation": "why this custom metric was needed"
      }}
    ],
    "entities": [
      {{
        "name": "entity name",
        "entity_type": "METRIC|CUSTOM_METRIC|SCORE|MODEL|DATASET",
        "confidence": 0.0-1.0,
        "context": "quote from text"
      }}
    ],
    "relations": [
      {{
        "relation_type": "MEASURES|SCORED_ON|REPORTS_METRIC|ACHIEVES|INTRODUCES_METRIC|CORRELATES_WITH",
        "source_entity": "entity name",
        "target_entity": "entity name",
        "confidence": 0.0-1.0,
        "evidence": "supporting quote"
      }}
    ]
  }}

  OUTPUT JSON:
