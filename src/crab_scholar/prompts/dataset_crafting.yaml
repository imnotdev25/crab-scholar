name: dataset_crafting
display_name: "Dataset Crafting Strategies"
description: "How datasets were created, collected, curated, and prepared for evaluation"
system_message: |
  You are a research data specialist focusing on dataset creation and curation
  for LLM evaluation. Extract detailed information about dataset construction.
  Always output valid JSON.
extraction_prompt: |
  Analyze the following research paper and extract information about dataset crafting strategies.

  Paper: {title}
  Authors: {authors}

  TEXT:
  {paper_text}

  Extract the following and return as JSON:
  {{
    "datasets_used": [
      {{
        "name": "dataset name",
        "source": "where it comes from (created, existing, modified)",
        "size": "number of samples/size if mentioned",
        "domain": "domain/topic area",
        "language": "language(s) if mentioned"
      }}
    ],
    "creation_methods": ["how datasets were created or curated"],
    "annotation_process": "description of annotation if any",
    "data_splits": "train/val/test split strategy if mentioned",
    "preprocessing": ["preprocessing steps applied"],
    "quality_control": ["quality assurance measures"],
    "data_augmentation": ["augmentation techniques if any"],
    "entities": [
      {{
        "name": "entity name",
        "entity_type": "DATASET|DATA_SOURCE|ANNOTATION_METHOD|PREPROCESSING_STEP|DOMAIN",
        "confidence": 0.0-1.0,
        "context": "quote from text"
      }}
    ],
    "relations": [
      {{
        "relation_type": "CREATES_DATASET|DERIVES_FROM|ANNOTATED_BY|PREPROCESSED_WITH|APPLIED_TO|SUBSET_OF|AUGMENTED_WITH",
        "source_entity": "entity name",
        "target_entity": "entity name",
        "confidence": 0.0-1.0,
        "evidence": "supporting quote"
      }}
    ]
  }}

  If the paper does not discuss dataset creation, return minimal entities from what is available.

  OUTPUT JSON:
