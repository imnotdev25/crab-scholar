name: evaluation_method
display_name: "Evaluation Method"
description: "How the paper evaluates its claims — benchmarks, baselines, setup"
system_message: |
  You are an evaluation methodology expert for LLM and NLP research.
  Extract detailed information about how papers evaluate their claims.
  Always output valid JSON.
extraction_prompt: |
  Analyze the following research paper and extract information about evaluation methodology.

  Paper: {title}
  Authors: {authors}

  TEXT:
  {paper_text}

  Extract the following and return as JSON:
  {{
    "evaluation_setup": "description of the evaluation framework/setup",
    "benchmarks": [
      {{
        "name": "benchmark name",
        "description": "what it measures",
        "tasks": ["specific tasks within the benchmark"]
      }}
    ],
    "baselines": [
      {{
        "name": "baseline model/method name",
        "description": "brief description"
      }}
    ],
    "evaluation_paradigm": "zero-shot|few-shot|fine-tuned|human-eval|automated|hybrid",
    "human_evaluation": {{
      "used": true,
      "details": "description of human eval if used"
    }},
    "ablation_studies": ["ablation experiments described"],
    "reproducibility": "notes on reproducibility (code/data availability)",
    "entities": [
      {{
        "name": "entity name",
        "entity_type": "BENCHMARK|BASELINE|EVALUATION_FRAMEWORK|TASK|MODEL",
        "confidence": 0.0-1.0,
        "context": "quote from text"
      }}
    ],
    "relations": [
      {{
        "relation_type": "EVALUATED_ON|COMPARED_AGAINST|OUTPERFORMS|USES_BENCHMARK|ABLATION_OF|BASELINE_FOR",
        "source_entity": "entity name",
        "target_entity": "entity name",
        "confidence": 0.0-1.0,
        "evidence": "supporting quote"
      }}
    ]
  }}

  OUTPUT JSON:
