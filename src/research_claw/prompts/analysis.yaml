name: analysis
display_name: "Paper Analysis"
description: "High-level overview of the paper — contributions, methodology, key findings"
system_message: |
  You are a research paper analyst specializing in LLM evaluation and NLP research.
  Extract structured information about the paper's core contributions and methodology.
  Always output valid JSON.
extraction_prompt: |
  Analyze the following research paper and extract structured information.

  Paper: {title}
  Authors: {authors}
  Year: {year}
  Venue: {venue}

  TEXT:
  {paper_text}

  Extract the following and return as JSON:
  {{
    "summary": "2-3 sentence summary of the paper",
    "problem_statement": "What problem does this paper address?",
    "contributions": ["list of main contributions"],
    "methodology": "Brief description of the approach/method",
    "key_findings": ["list of key findings/results"],
    "limitations": ["list of limitations acknowledged by authors"],
    "entities": [
      {{
        "name": "entity name",
        "entity_type": "PAPER|METHOD|DATASET|BENCHMARK|CONCEPT|FINDING|AUTHOR|VENUE",
        "confidence": 0.0-1.0,
        "context": "quote from text where entity appears"
      }}
    ],
    "relations": [
      {{
        "relation_type": "PROPOSES|USES|EVALUATES_ON|COMPARES_TO|EXTENDS|IMPROVES|ADDRESSES",
        "source_entity": "entity name",
        "target_entity": "entity name",
        "confidence": 0.0-1.0,
        "evidence": "supporting quote from text"
      }}
    ]
  }}

  OUTPUT JSON:
